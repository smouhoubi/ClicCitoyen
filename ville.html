<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Tableau de bord — ClicCitoyen</title>
<meta name="description" content="Indicateurs financiers MAMH, élus et calculateur de taxes pour votre municipalité.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bleu:#0a1f44;--bleu-vif:#1d4ed8;--bleu-clair:#dbeafe;--rouge:#c0392b;--vert:#059669;--orange:#d97706;--creme:#f5f0e8;--beige:#e8e1d4;--texte:#1a1a2e;--gris:#6b7280;--blanc:#ffffff;--ombre:0 4px 24px rgba(10,31,68,.12);--radius:12px;--transition:.25s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--creme);color:var(--texte);line-height:1.6}
nav{position:sticky;top:0;z-index:100;background:var(--bleu);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.nav-logo{font-family:'Libre Baskerville',serif;font-size:1.1rem;color:white;text-decoration:none}
.nav-logo span{color:#60a5fa}
.nav-links{display:flex;gap:1.5rem;list-style:none}
.nav-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.88rem;font-weight:600}
.nav-links a:hover{color:#60a5fa}
.ville-hero{background:var(--bleu);padding:2.5rem 2rem;color:white}
.ville-hero-inner{max-width:1180px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.breadcrumb{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:.5rem}
.breadcrumb a{color:#60a5fa;text-decoration:none}
.ville-titre{font-family:'Libre Baskerville',serif;font-size:clamp(1.75rem,4vw,2.75rem);font-weight:700;line-height:1.1}
.ville-sous{color:rgba(255,255,255,.65);font-size:1rem;margin-top:.4rem}
.ville-meta{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1rem}
.meta-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:.35rem .9rem;border-radius:999px;font-size:.82rem;font-weight:600}
.meta-badge span{opacity:.6;margin-right:.3rem}
.ville-annee-select{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:white;border-radius:8px;padding:.5rem 1rem;font-family:inherit;font-size:.9rem;cursor:pointer;outline:none}
.main-layout{max-width:1180px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:1fr 340px;gap:1.5rem}
@media(max-width:900px){.main-layout{grid-template-columns:1fr}}
.card{background:white;border-radius:var(--radius);padding:1.75rem;box-shadow:var(--ombre);border:1px solid var(--beige);margin-bottom:1.5rem}
.card:last-child{margin-bottom:0}
.card-title{font-family:'Libre Baskerville',serif;font-size:1.05rem;color:var(--bleu);margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;margin-bottom:1.5rem}
@media(max-width:680px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--creme);border-radius:10px;padding:1.1rem 1.25rem;border-left:3px solid var(--bleu-vif)}
.kpi-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gris)}
.kpi-value{font-family:'DM Mono',monospace;font-size:1.2rem;font-weight:500;color:var(--bleu);line-height:1.2;margin:.25rem 0}
.kpi-note{font-size:.71rem;color:var(--gris)}
.kpi-card.good{border-left-color:var(--vert)}
.kpi-card.warn{border-left-color:var(--orange)}
.kpi-card.bad{border-left-color:var(--rouge)}
.chart-container{position:relative;height:290px}
.chart-container.tall{height:330px}
.tabs{display:flex;margin-bottom:1.5rem;border-bottom:2px solid var(--beige);overflow-x:auto}
.tab{padding:.7rem 1rem;font-size:.87rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--gris);transition:all var(--transition);white-space:nowrap}
.tab.active{color:var(--bleu-vif);border-bottom-color:var(--bleu-vif)}
.comp-group-label{font-size:.78rem;font-weight:700;color:var(--bleu);text-transform:uppercase;letter-spacing:.05em;margin:1.1rem 0 .7rem;padding-top:1rem;border-top:1px solid var(--beige)}
.comp-group-label:first-child{border-top:none;margin-top:0;padding-top:0}
.comp-bar-wrap{margin-bottom:.9rem}
.comp-bar-header{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.3rem}
.comp-bar-header span:first-child{color:var(--gris)}
.comp-val-ville{font-family:'DM Mono',monospace;font-weight:700;color:var(--bleu)}
.comp-val-ref{font-family:'DM Mono',monospace;color:var(--gris);font-size:.74rem}
.comp-bar-track{height:7px;background:var(--beige);border-radius:999px;position:relative;overflow:visible}
.comp-bar-fill{height:7px;border-radius:999px;background:var(--bleu-vif);transition:width .9s cubic-bezier(.4,0,.2,1);max-width:100%}
.comp-bar-fill.good{background:var(--vert)}
.comp-bar-fill.warn{background:var(--orange)}
.comp-bar-fill.bad{background:var(--rouge)}
.comp-marker{position:absolute;top:-2px;width:3px;height:11px;background:rgba(0,0,0,.45);border-radius:2px;z-index:2}
.comp-legend{display:flex;gap:1rem;font-size:.71rem;color:var(--gris);margin-top:.75rem;flex-wrap:wrap}
.fiche-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
@media(max-width:540px){.fiche-grid{grid-template-columns:1fr}}
.fiche-item{background:var(--creme);border-radius:8px;padding:.9rem 1rem}
.fiche-label{font-size:.73rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);margin-bottom:.25rem}
.fiche-value{font-family:'DM Mono',monospace;font-size:.97rem;font-weight:500;color:var(--bleu);display:flex;align-items:center;flex-wrap:wrap;gap:.3rem}
.fiche-sub{font-size:.71rem;color:var(--gris);margin-top:.2rem}
.diff-badge{font-size:.7rem;padding:.12rem .35rem;border-radius:3px;font-weight:700}
.diff-bon{background:#d1fae5;color:#065f46}
.diff-mau{background:#fee2e2;color:#991b1b}
.calc-label{display:block;font-size:.85rem;font-weight:600;color:var(--bleu);margin-bottom:.4rem}
.calc-input{width:100%;padding:.75rem 1rem;border:2px solid var(--beige);border-radius:8px;font-size:1rem;font-family:'DM Mono',monospace;outline:none;transition:border-color var(--transition)}
.calc-input:focus{border-color:var(--bleu-vif)}
.calc-result{background:linear-gradient(135deg,var(--bleu),#1e3a8a);color:white;border-radius:10px;padding:1.25rem;text-align:center;margin-top:1rem}
.calc-result-label{font-size:.85rem;opacity:.75}
.calc-result-value{font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:700;margin:.25rem 0}
.calc-result-sub{font-size:.8rem;opacity:.65}
.calc-breakdown{margin-top:1rem;border-top:1px solid var(--beige);padding-top:1rem}
.calc-row{display:flex;justify-content:space-between;font-size:.84rem;padding:.3rem 0;border-bottom:1px dashed var(--beige)}
.calc-row:last-child{border:none}
.calc-mono{font-family:'DM Mono',monospace;font-weight:500}
.elus-list{display:flex;flex-direction:column;gap:.75rem}
#elus{scroll-margin-top:80px}
.elu-card{display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:10px;background:var(--creme);border:1px solid var(--beige)}
.elu-avatar{width:44px;height:44px;border-radius:50%;background:var(--bleu-clair);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;overflow:hidden}
.elu-avatar img{width:100%;height:100%;object-fit:cover}
.elu-info{flex:1;min-width:0}
.elu-nom{font-weight:700;font-size:.93rem;color:var(--bleu)}
.elu-poste{font-size:.78rem;color:var(--gris)}
.elu-district{font-size:.74rem;color:var(--gris);font-style:italic}
@keyframes elusHighlight{0%{box-shadow:0 0 0 0 rgba(37,99,235,.5);background:var(--bleu-clair)}100%{box-shadow:0 0 0 12px rgba(37,99,235,0);background:white}}
.elus-highlight{animation:elusHighlight .9s ease-out forwards}
.loading-overlay{text-align:center;padding:3rem;color:var(--gris)}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--beige);border-top-color:var(--bleu-vif);animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:.4rem;background:none;border:none;margin-left:.5rem}
.nav-hamburger span{display:block;width:22px;height:2px;background:white;border-radius:2px;transition:transform .3s,opacity .3s}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:640px){
  nav{padding:0 1rem;flex-wrap:wrap;height:auto;min-height:60px}
  .nav-hamburger{display:flex}
  .nav-links{display:none;width:100%;flex-direction:column;gap:0;padding-bottom:.75rem}
  .nav-links.open{display:flex}
  .nav-links li{border-top:1px solid rgba(255,255,255,.1)}
  .nav-links a{display:block;padding:.75rem .5rem;font-size:.9rem}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🏙️ Clic<span>Citoyen</span></a>
  <ul class="nav-links" id="navLinks">>
    <li><a href="explorateur.html">Explorer</a></li>
    <li><a href="municipalites.html">Municipalités</a></li>
    <li><a href="comparateur.html">Comparer</a></li>
    <li><a href="a-propos.html">À propos</a></li>
    <button class="nav-hamburger" aria-label="Menu" onclick="document.getElementById("navLinks").classList.toggle("open");this.classList.toggle("open")"><span></span><span></span><span></span></button>
</nav>

<div class="ville-hero">
  <div class="ville-hero-inner">
    <div>
      <div class="breadcrumb"><a href="index.html">Accueil</a> › Tableau de bord</div>
      <div class="ville-titre" id="villeNom">Chargement...</div>
      <div class="ville-sous" id="villeSous"></div>
      <div class="ville-meta" id="villeMeta"></div>
    </div>
    <select class="ville-annee-select" id="anneeSelect" onchange="changerAnnee()">
      <option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option>
    </select>
  </div>
</div>

<div class="main-layout" id="mainContent">
  <div class="loading-overlay" style="grid-column:1/-1">
    <div class="spinner"></div>Chargement des données MAMH...
  </div>
</div>

<script src="js/data-client.js"></script>
<script>
// ── Constantes de démo (fallback si données absentes) ──────
const DEMO_DASHBOARD  = {};
const DEMO_HISTORIQUE = {};
const DEMO_REFERENCES = {};

// ── État global ────────────────────────────────────────────
let villeData = null, dashData = null, histData = {}, refData = {}, elusData = [], catsData = [];
let anneeActive  = 2025;
let _chartsRendered = {};

// ── Initialisation ─────────────────────────────────────────
async function init() {
  const code = getUrlParam('id');   // on utilise le code géographique comme id
  if (!code) { window.location.href = 'index.html'; return; }

  try {
    // Un seul fetch : ville/{code}.json contient dashboard + élus + catégories
    const payload  = await fetchVille(code);
    villeData      = payload;
    dashData       = payload.dashboard || { ...DEMO_DASHBOARD };
    // Dédupliquer les élus : le JSON accumule plusieurs mandats historiques.
    // On garde la première occurrence de chaque (nom + prénom), avec normalisation
    // des accents pour éviter les doublons (ex: "Stéphane" vs "Stephane").
    const rawElus = payload.elus || [];
    const _seen = new Set();
    const _norm = s => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    elusData = rawElus.filter(e => {
      const key = `${_norm(e.nom)}|${_norm(e.prenom)}`;
      if (_seen.has(key)) return false;
      _seen.add(key);
      return true;
    });
    catsData       = payload.categories_depenses || [];
    if (dashData?.annee_fiscale) anneeActive = dashData.annee_fiscale;
  } catch {
    // Données absentes pour cette municipalité → page d'erreur claire
    document.getElementById('villeNom').textContent = 'Données non disponibles';
    document.title = 'Données non disponibles — ClicCitoyen';
    document.getElementById('mainContent').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:4rem 2rem;background:white;
                  border-radius:var(--radius);box-shadow:var(--ombre);max-width:560px;margin:2rem auto">
        <div style="font-size:3rem;margin-bottom:1rem">📭</div>
        <h2 style="font-family:'Libre Baskerville',serif;color:var(--bleu);margin-bottom:.75rem">
          Données non disponibles
        </h2>
        <p style="color:var(--gris);margin-bottom:.5rem">
          Les données MAMH pour la municipalité
          <strong style="color:var(--texte)">${code}</strong>
          ne sont pas encore disponibles dans cette version.
        </p>
        <p style="color:var(--gris);font-size:.9rem;margin-bottom:2rem">
          Seules les municipalités ayant transmis leur rapport financier au MAMH
          apparaissent dans la base de données.
        </p>
        <a href="municipalites.html"
           style="display:inline-block;padding:.85rem 2rem;background:var(--bleu-vif);
                  color:white;border-radius:8px;text-decoration:none;font-weight:700;
                  transition:background .2s"
           onmouseover="this.style.background='#1e40af'"
           onmouseout="this.style.background='var(--bleu-vif)'">
          ← Retour à la liste des municipalités
        </a>
      </div>`;
    return;
  }

  const nom = dashData?.nom || villeData?.nom || 'Municipalité';
  document.getElementById('villeNom').textContent = nom;
  document.title = `${nom} — ClicCitoyen`;

  // Charger historique et références en parallèle
  try {
    await Promise.all([loadHist(code), loadRef()]);
  } catch { /* erreurs gérées dans chaque fonction */ }
  afficherHero();
  afficherInterface();
}

async function loadHist(code) {
  try {
    const h = await fetchHistorique(code,
      ['TGTU','CHARGE_TOTAL','ENDET_NET_LT','EXCED_FONCT','REV_TOTAL','RFU']);
    histData = h;
  } catch { histData = {}; }
}

async function loadRef() {
  try {
    const cl  = classeVersCode(dashData?.classe_population || '');
    const reg = regionVersCode(dashData?.region_administrative || '');
    const codes = ['PROV_QUEBEC'];
    if (cl)  codes.push(cl);
    if (reg) codes.push(reg);
    const annee = await getAnneeActive();
    const rows  = await fetchReference(codes, annee);
    refData = {};
    rows.forEach(r => { refData[r.code_groupe] = r; });
  } catch { refData = {}; }
}

// ── Helpers classe / région ────────────────────────────────
function classeVersCode(c) {
  if (!c) return null;
  if (c.includes('100'))  return 'CL_100K_PLUS';
  if (c.includes('25'))   return 'CL_25K_99K';
  if (c.includes('10'))   return 'CL_10K_24K';
  if (c.includes('5'))    return 'CL_5K_9K';
  if (c.includes('2'))    return 'CL_2K_4K';
  return null;
}
function regionVersCode(r) {
  // Mapping des 17 régions administratives du Québec
  const MAP = {
    'Bas-Saint-Laurent':            'REG_BAS_SAINT_LAURENT',
    'Saguenay–Lac-Saint-Jean':      'REG_SAGUENAY_LAC_SAINT_JEAN',
    'Capitale-Nationale':           'REG_CAPITALE_NATIONALE',
    'Mauricie':                     'REG_MAURICIE',
    'Estrie':                       'REG_ESTRIE',
    'Montréal':                     'REG_MONTREAL',
    'Outaouais':                    'REG_OUTAOUAIS',
    'Abitibi-Témiscamingue':        'REG_ABITIBI_TEMISCAMINGUE',
    'Côte-Nord':                    'REG_COTE_NORD',
    'Nord-du-Québec':               'REG_NORD_DU_QUEBEC',
    'Gaspésie–Îles-de-la-Madeleine':'REG_GASPESIE',
    'Chaudière-Appalaches':         'REG_CHAUDIERE_APPALACHES',
    'Laval':                        'REG_LAVAL',
    'Lanaudière':                   'REG_LANAUDIERE',
    'Laurentides':                  'REG_LAURENTIDES',
    'Montérégie':                   'REG_MONTEREGIE',
    'Centre-du-Québec':             'REG_CENTRE_DU_QUEBEC',
  };
  return MAP[r] || null;
}

// ── En-tête ────────────────────────────────────────────────
function afficherHero() {
  const pop    = dashData?.population || villeData?.population || 0;
  const region = dashData?.region_administrative || villeData?.region_administrative || '';
  const annee  = dashData?.annee_fiscale || anneeActive;

  document.getElementById('villeSous').textContent =
    `${region}${pop ? ' · ' + formatNombre(pop) + ' habitants' : ''}`;

  // Remplir le sélecteur d'années : années de l'historique + années de base (2023-2025)
  const anneesHist = [...new Set(
    Object.values(histData).flatMap(arr => arr.map(r => r.annee))
  )];
  const ANNEES_BASE = [2025, 2024, 2023];
  const anneesDispo = [...new Set([...anneesHist, ...ANNEES_BASE])].sort((a, b) => b - a);

  document.getElementById('anneeSelect').innerHTML =
    anneesDispo.map(a => `<option value="${a}" ${a == annee ? 'selected' : ''}>${a}</option>`).join('');

  const siteWeb = dashData?.site_web_officiel || villeData?.site_web_officiel;
  const metas = [
    `<div class="meta-badge"><span>📅</span>Données ${annee}</div>`,
    dashData?.classe_population ? `<div class="meta-badge"><span>🏘</span>${dashData.classe_population}</div>` : '',
    dashData?.mrc ? `<div class="meta-badge"><span>🗺</span>${dashData.mrc}</div>` : '',
    dashData?.communaute_metropolitaine ? `<div class="meta-badge"><span>🏙</span>${dashData.communaute_metropolitaine}</div>` : '',
    siteWeb ? `<div class="meta-badge"><a href="${siteWeb}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none"><span>🌐</span>Site officiel</a></div>` : '',
    elusData.length > 0 ? `<div class="meta-badge"><a href="#elus" onclick="scrollToElus(event)" style="color:inherit;text-decoration:none"><span>🤝</span>Voir les élus (${elusData.length})</a></div>` : '',
  ];
  document.getElementById('villeMeta').innerHTML = metas.join('');
}

// ── Formatage indice d'effort fiscal ──────────────────────
function formatIndice(val) {
  if (val == null || isNaN(Number(val))) return '—';
  return parseFloat(val).toFixed(1);
}

// ── Interface principale ───────────────────────────────────
function afficherInterface() {
  const d           = dashData;
  const pop         = d.population || 1;
  const detteParHab = d.dette_nette_habitant != null ? d.dette_nette_habitant
                      : (pop > 0 && d.dette_nette_lt != null ? d.dette_nette_lt / pop : null);
  const chargesParHab = d.charges_par_habitant != null ? d.charges_par_habitant
                        : (pop > 0 && d.charges_totales != null ? d.charges_totales / pop : null);
  const refProv     = refData['PROV_QUEBEC'] || {};
  const tgtuClasse  = d.taux_global_taxation && refProv.tgtu_ref
    ? (d.taux_global_taxation < refProv.tgtu_ref * 0.9 ? 'good'
      : d.taux_global_taxation > refProv.tgtu_ref * 1.1 ? 'warn' : '') : '';
  const nomVille    = d.nom || villeData?.nom || '';
  const siteWeb     = d.site_web_officiel || villeData?.site_web_officiel;
  const codeGeo     = d.code_geographique || villeData?.code_geographique || '';

  document.getElementById('mainContent').innerHTML = `
  <div>
    <!-- 6 KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card ${tgtuClasse}">
        <div class="kpi-label">Taux global de taxation (TGTU)</div>
        <div class="kpi-value">${formatTaux(d.taux_global_taxation)}</div>
        <div class="kpi-note">Réf. Québec : ${formatTaux(refProv.tgtu_ref)}</div>
      </div>
      <div class="kpi-card good">
        <div class="kpi-label">Charges totales</div>
        <div class="kpi-value">${formatCAD(d.charges_totales)}</div>
        <div class="kpi-note">${formatCAD(chargesParHab, 0)} / habitant</div>
      </div>
      <div class="kpi-card ${(d.excedent_accumule ?? d.excedent_fonctionnement ?? 0) >= 0 ? 'good' : 'bad'}">
        <div class="kpi-label">Excédent accumulé</div>
        <div class="kpi-value">${formatCAD(d.excedent_accumule ?? d.excedent_fonctionnement)}</div>
        <div class="kpi-note">${(d.excedent_accumule ?? d.excedent_fonctionnement ?? 0) >= 0 ? '✓ Bilan positif' : '⚠ Déficit'}</div>
      </div>
      <div class="kpi-card ${detteParHab == null ? '' : detteParHab < 4000 ? 'good' : detteParHab < 8000 ? 'warn' : 'bad'}">
        <div class="kpi-label">Dette nette / habitant</div>
        <div class="kpi-value">${detteParHab != null ? formatCAD(detteParHab, 0) : '—'}</div>
        <div class="kpi-note">Total : ${formatCAD(d.dette_nette_lt ?? (detteParHab != null ? detteParHab * pop : null))}</div>
      </div>
      <div class="kpi-card ${d.charge_fiscale_logement < (refProv.charge_fisc_log_ref || 9999) ? 'good' : 'warn'}">
        <div class="kpi-label">Charge fiscale / logement</div>
        <div class="kpi-value">${formatCAD(d.charge_fiscale_logement, 0)}</div>

// ── Graphique tendances ────────────────────────────────────
function renderTend() {
  const ctx = document.getElementById('cTend')?.getContext('2d');
  if (!ctx || _chartsRendered.tend) return;
  _chartsRendered.tend = true;
  const annees = [...new Set(Object.values(histData).flatMap(a => a.map(r => r.annee)))].sort();
  if (!annees.length) {
    ctx.canvas.parentElement.innerHTML = '<p style="text-align:center;color:var(--gris);padding:2rem">Données historiques insuffisantes</p>';
    return;
  }
  const getVals = (ind) => annees.map(a => histData[ind]?.find(r => r.annee === a)?.valeur ?? null);
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: annees,
      datasets: [
        { label: 'TGTU ($/100$)', data: getVals('TGTU'),
          borderColor: COULEUR_VILLE, backgroundColor: COULEUR_VILLE + '22',
          yAxisID: 'yTaux', tension: .4, fill: true, borderWidth: 2.5, pointRadius: 5 },
        { label: 'Charges totales (M$)', data: getVals('CHARGE_TOTAL').map(v => v ? v / 1e6 : null),
          borderColor: COULEUR_CLASSE, backgroundColor: 'transparent',
          yAxisID: 'yCharges', tension: .4, borderWidth: 2.5, borderDash: [5, 4], pointRadius: 5 },
        { label: 'Excédent (M$)', data: getVals('EXCED_FONCT').map(v => v ? v / 1e6 : null),
          borderColor: COULEUR_PROV, backgroundColor: 'transparent',
          yAxisID: 'yCharges', tension: .4, borderWidth: 2, pointRadius: 4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { size: 11 } } } },
      scales: {
        yTaux:    { position: 'left',  title: { display: true, text: 'TGTU ($/100$)', font: { size: 10 } }, grid: { color: '#f0ede6' } },
        yCharges: { position: 'right', title: { display: true, text: 'Millions $',    font: { size: 10 } }, grid: { display: false } },
        x: { grid: { display: false } }
      }
    }
  });
}

// ── Graphique revenus / charges ────────────────────────────
function renderRevDep() {
  const ctx = document.getElementById('cRevDep')?.getContext('2d');
  if (!ctx || _chartsRendered.revdep) return;
  _chartsRendered.revdep = true;

  // Rassembler toutes les années disponibles depuis l'historique OU le dashboard
  const anneesHist = [...new Set([...(histData.CHARGE_TOTAL || []).map(r => r.annee)])].sort();

  // Si l'historique n'a pas CHARGE_TOTAL mais que dashData en a, construire depuis dashData
  const anneeDash = dashData?.annee_fiscale || anneeActive;
  const chargesDash  = dashData?.charges_totales;
  const revenusDash  = dashData?.revenus_totaux;
  const excedDash    = dashData?.excedent_accumule ?? dashData?.excedent_fonctionnement;

  // Fusionner : données historiques + année courante depuis dashboard
  const anneesSet = new Set(anneesHist);
  if (chargesDash != null || revenusDash != null) anneesSet.add(anneeDash);
  const annees = [...anneesSet].sort();

  if (!annees.length) {
    ctx.canvas.parentElement.innerHTML = '<p style="text-align:center;color:var(--gris);padding:2rem">Données insuffisantes</p>';
    return;
  }

  function getCharges(a) {
    const hist = histData.CHARGE_TOTAL?.find(r => r.annee === a)?.valeur;
    if (hist != null) return hist;
    if (a === anneeDash && chargesDash != null) return chargesDash;
    return 0;
  }

  function getRevenus(a) {
    const hist = histData.REV_TOTAL?.find(r => r.annee === a)?.valeur;
    if (hist != null) return hist;
    // Fallback : revenus = charges + excédent (si disponibles)
    if (a === anneeDash) {
      if (revenusDash != null) return revenusDash;
      const ch = getCharges(a);
      const ex = excedDash ?? 0;
      return ch + Math.max(ex, 0);
    }
    const ch = getCharges(a);
    const ex = (histData.EXCED_FONCT?.find(r => r.annee === a)?.valeur || 0);
    return ch + Math.max(ex, 0);
  }

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: annees,
      datasets: [
        { label: 'Revenus (M$)',
          data: annees.map(a => +(getRevenus(a) / 1e6).toFixed(1)),
          backgroundColor: COULEUR_VILLE + 'bb', borderRadius: 6 },
        { label: 'Charges (M$)',
          data: annees.map(a => +(getCharges(a) / 1e6).toFixed(1)),
          backgroundColor: COULEUR_CLASSE + 'bb', borderRadius: 6 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top' } },
      scales: { y: { title: { display: true, text: 'Millions $' }, grid: { color: '#f0ede6' } }, x: { grid: { display: false } } }
    }
  });
}

// ── Fiche avancée ──────────────────────────────────────────
function renderFiche() {
  const d = dashData;
  const refProv = refData['PROV_QUEBEC'] || {};
  function diffBadge(val, ref, lower = true) {
    if (ref == null || val == null) return '';
    const v = parseFloat(val), r = parseFloat(ref);
    if (isNaN(v) || isNaN(r) || r === 0) return '';
    const pct = Math.round(Math.abs((v - r) / r * 100));
    const bon = lower ? v <= r : v >= r;
    return `<span class="diff-badge ${bon ? 'diff-bon' : 'diff-mau'}">${bon ? '▼' : '▲'} ${pct}% vs Qc</span>`;
  }
  const items = [
    { label: 'Charges / 100$ RFU',        val: d.charge_nette_rfu != null ? parseFloat(d.charge_nette_rfu).toFixed(2) + ' $' : '—', num: d.charge_nette_rfu,       ref: refProv.charge_nette_rfu_ref, lower: true },
    { label: 'Endettement / 100$ RFU',     val: d.endettement_rfu  != null ? parseFloat(d.endettement_rfu).toFixed(2)  + ' $' : '—', num: d.endettement_rfu,        ref: refProv.endet_rfu_ref,        lower: true },
    { label: 'Charge fiscale / logement',  val: formatCAD(d.charge_fiscale_logement, 0),                                               num: d.charge_fiscale_logement, ref: refProv.charge_fisc_log_ref,  lower: true },
    { label: 'Indice effort fiscal',       val: d.indice_effort_fiscal ? Math.round(d.indice_effort_fiscal) + ' / 100' : '—',           num: d.indice_effort_fiscal,    ref: 100,                          lower: true },
    { label: 'Revenus totaux',             val: formatCAD(d.revenus_totaux),     num: null, ref: null },
    { label: 'Excédent accumulé',           val: formatCAD(d.excedent_accumule ?? d.excedent_fonctionnement), num: null, ref: null },
    { label: 'Richesse foncière (RFU)',    val: formatCAD(d.richesse_fonciere),  num: null, ref: null },
    { label: 'Éval. moy. résidence 1 log.',val: d.eval_moy_residence ? formatCAD(d.eval_moy_residence, 0) : '—', num: null, ref: null },
  ];
  document.getElementById('ficheGrid').innerHTML = items.map(it => `
    <div class="fiche-item">
      <div class="fiche-label">${it.label}</div>
      <div class="fiche-value">${it.val} ${it.ref != null ? diffBadge(it.num, it.ref, it.lower) : ''}</div>
      ${it.ref != null ? `<div class="fiche-sub">Réf. Québec : ${typeof it.ref === 'number' && it.ref < 20 ? parseFloat(it.ref).toFixed(2) + ' $' : formatCAD(it.ref, 0)}</div>` : ''}
    </div>`).join('');
}

// ── Comparaison groupes ────────────────────────────────────
function renderComp() {
  const d       = dashData;
  const section = document.getElementById('compSection');
  const indicateurs = [
    { key: 'tgtu_ref',            label: 'Taux global de taxation',   val: d.taux_global_taxation,    fmt: formatTaux,                         max: 1.5,  lower: true },
    { key: 'charge_nette_rfu_ref',label: 'Charges / 100$ RFU',        val: d.charge_nette_rfu,        fmt: v => parseFloat(v).toFixed(2)+' $', max: 3.5,  lower: true },
    { key: 'endet_rfu_ref',       label: 'Endettement / 100$ RFU',    val: d.endettement_rfu,         fmt: v => parseFloat(v).toFixed(2)+' $', max: 6,    lower: true },
    { key: 'charge_fisc_log_ref', label: 'Charge fiscale / logement', val: d.charge_fiscale_logement, fmt: v => formatCAD(v, 0),               max: 8000, lower: true },
  ];
  const ordreGroupes = [
    Object.keys(refData).find(k => k.startsWith('CL_')),
    Object.keys(refData).find(k => k.startsWith('REG_')),
    'PROV_QUEBEC',
  ].filter(Boolean);

  let html = '';
  ordreGroupes.forEach(codeG => {
    const ref = refData[codeG];
    if (!ref) return;
    html += `<div class="comp-group-label">${ref.libelle_groupe || codeG}</div>`;
    indicateurs.forEach(ind => {
      const refVal  = parseFloat(ref[ind.key]);
      const villeVal = parseFloat(ind.val);
      if (isNaN(refVal) || isNaN(villeVal)) return;
      const pctV = Math.min(villeVal / ind.max * 100, 100);
      const pctR = Math.min(refVal   / ind.max * 100, 100);
      const meilleur = ind.lower ? villeVal <= refVal : villeVal >= refVal;
      const ecart    = Math.abs(villeVal - refVal) / refVal;
      const cl       = meilleur ? 'good' : ecart > .15 ? 'bad' : 'warn';
      html += `
        <div class="comp-bar-wrap">
          <div class="comp-bar-header">
            <span>${ind.label}</span>
            <span>
              <span class="comp-val-ville">${ind.fmt(villeVal)}</span>
              <span class="comp-val-ref"> · réf: ${ind.fmt(refVal)}</span>
            </span>
          </div>
          <div class="comp-bar-track">
            <div class="comp-bar-fill ${cl}" style="width:${pctV.toFixed(1)}%"></div>
            <div class="comp-marker" style="left:${pctR.toFixed(1)}%"></div>
          </div>
        </div>`;
    });
  });

  if (!html) html = '<p style="color:var(--gris);font-size:.9rem">Données de référence disponibles après import ETL complet.</p>';
  else html += `<div class="comp-legend">
    <span>Barre colorée = ville &nbsp;|&nbsp; Trait noir = médiane du groupe</span>
    <span>🟢 Favorable &nbsp;🟡 Légèrement défavorable &nbsp;🔴 Défavorable</span>
  </div>`;
  section.innerHTML = html;
}

// ── Scroll vers élus ───────────────────────────────────────
function scrollToElus(e) {
  e.preventDefault();
  const el = document.getElementById('elus');
  if (!el) return;
  const navH = document.querySelector('nav')?.offsetHeight || 60;
  const top  = el.getBoundingClientRect().top + window.scrollY - navH - 16;
  window.scrollTo({ top, behavior: 'smooth' });
  // Highlight the card after scroll lands
  setTimeout(() => {

// ── Calculateur ────────────────────────────────────────────
function calcTaxes() {
  const val  = parseFloat(document.getElementById('valMaison')?.value) || 0;
  const tgtu = parseFloat(document.getElementById('tgtuInput')?.value) || 0;
  const et   = document.getElementById('calcTotal');
  const em   = document.getElementById('calcMois');
  if (!et) return;

  if (!tgtu || !val) {
    et.textContent = '—';
    if (em) em.textContent = '—';
    return;
  }

  const annuel = calculerTaxes(val, tgtu);
  et.textContent = val > 0 ? formatCAD(annuel, 0) : '—';
  em.textContent = val > 0 ? formatCAD(annuel / 12, 0) : '—';

    const bd = document.getElementById('calcBreak');
  if (val > 0 && bd) {
    // Priorité 1 : catégories de dépenses réelles (requiert indicateurs_gestion_mamh.xlsx)
    // Priorité 2 : répartition de la base imposable par secteur (profil financier MAMH)
    // Priorité 3 : répartition typique québécoise
    let cats;
    if (catsData.length) {
      cats = catsData;
    } else {
      const pctResid = dashData?.pct_base_residentielle;
      const pctAutre = dashData?.pct_base_autre;
      const pctComp  = dashData?.pct_base_compensations;
      if (pctResid != null && pctResid > 0) {
        // Construire une répartition estimée à partir de la base imposable
        const pctNonCat = Math.max(0, 100 - (pctResid + (pctAutre || 0) + (pctComp || 0)));
        cats = [
          { categorie: 'Part résidentielle',     pct: Math.round(pctResid * 10) / 10 },
          pctAutre > 0 && { categorie: 'Autre base (comm./ind.)', pct: Math.round((pctAutre || 0) * 10) / 10 },
          pctComp  > 0 && { categorie: 'Compensations (PILOT)',   pct: Math.round((pctComp  || 0) * 10) / 10 },
          pctNonCat > 0 && { categorie: 'Non réparti',            pct: Math.round(pctNonCat * 10) / 10 },
        ].filter(Boolean);
      } else {
        // Répartition typique québécoise (fallback final)
        cats = [
          { categorie: 'Rémunération globale',    pct: 22.1 },
          { categorie: 'Quotes-parts organismes', pct: 46.0 },
          { categorie: 'Service de la dette',     pct: 10.1 },
          { categorie: 'Autres charges',          pct: 21.8 },
        ];
      }
    }
    const note = catsData.length ? '' :
      '<p style="font-size:.75rem;color:var(--gris);margin-top:.5rem">* Répartition estimée</p>';
    bd.innerHTML = '<p style="font-size:.81rem;font-weight:700;color:var(--bleu);margin-bottom:.5rem">Répartition de vos taxes</p>'
      + cats.slice(0, 4).map(c => `<div class="calc-row">
          <span>${c.categorie || c.nom_categorie || ''}</span>
          <span class="calc-mono">${formatCAD(annuel * (c.pct || c.pourcentage_du_budget || 0) / 100, 0)}</span>
        </div>`).join('') + note;
  }
}

function switchTab(el, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['tTend', 'tRevDep', 'tFiche'].forEach(t => {
    const n = document.getElementById(t);
    if (n) n.style.display = t === id ? 'block' : 'none';
  });
  if (id === 'tTend')   renderTend();
  if (id === 'tRevDep') renderRevDep();
}

async function changerAnnee() {
  anneeActive = parseInt(document.getElementById('anneeSelect').value);
  const code  = dashData?.code_geographique || villeData?.code_geographique;
  try {
    const h = await fetchHistorique(code);
    // Chercher les valeurs pour l'année sélectionnée dans l'historique
    const MAP = {
      TGTU:             'taux_global_taxation',
      CHARGE_TOTAL:     'charges_totales',
      ENDET_NET_LT:     'dette_nette_lt',
      EXCED_FONCT:      'excedent_fonctionnement',
      EXCED_ACCUMULE:   'excedent_accumule',
      CHARGE_FISC_LOG:  'charge_fiscale_logement',
      IDX_EFFORT_FISCAL:'indice_effort_fiscal',
      CHARGE_NETTE_RFU: 'charge_nette_rfu',
      ENDET_RFU:        'endettement_rfu',
      REV_TOTAL:        'revenus_totaux',
      RFU:              'richesse_fonciere',
      DETTE_NET_HAB:    'dette_nette_habitant',
    };
    Object.entries(MAP).forEach(([ind, field]) => {
      const row = h[ind]?.find(r => r.annee === anneeActive);
      if (row != null) dashData[field] = row.valeur;
    });
    dashData.annee_fiscale = anneeActive;
  } catch {}
  _chartsRendered = {};
  afficherInterface();
}

init();
</script>
